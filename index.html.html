<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracker Board · Evolución SP</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0e1117; --surface:#161b26; --surface2:#1e2637; --border:#2a3347;
  --text:#e8eaf0; --text-muted:#8892a4;
  --verde:#22c55e; --verde-bg:rgba(34,197,94,.12);
  --amarillo:#f59e0b; --amarillo-bg:rgba(245,158,11,.12);
  --rojo:#ef4444; --rojo-bg:rgba(239,68,68,.12);
  --gris:#64748b; --gris-bg:rgba(100,116,139,.12);
  --accent:#6366f1; --accent2:#818cf8;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; font-size:14px; line-height:1.6; }
.header { background:linear-gradient(135deg,#12192b,#1a1f36 50%,#0e1117); border-bottom:1px solid var(--border); padding:32px 40px 28px; position:relative; overflow:hidden; }
.header::before { content:''; position:absolute; top:-60px; right:-60px; width:240px; height:240px; background:radial-gradient(circle,rgba(99,102,241,.18),transparent 70%); pointer-events:none; }
.eyebrow { font-size:11px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:var(--accent2); margin-bottom:6px; }
.header h1 { font-family:'DM Serif Display',serif; font-size:clamp(22px,3vw,32px); color:#fff; font-weight:400; line-height:1.2; }
.header h1 em { color:var(--accent2); font-style:italic; }
.header-meta { margin-top:8px; display:flex; align-items:center; gap:14px; flex-wrap:wrap; font-size:13px; color:var(--text-muted); }
.live-badge { display:inline-flex; align-items:center; gap:6px; background:rgba(34,197,94,.1); border:1px solid rgba(34,197,94,.25); border-radius:20px; padding:3px 12px; font-size:11px; color:var(--verde); }
.live-dot { width:6px; height:6px; background:var(--verde); border-radius:50%; animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(1.4)} }
.header-actions { margin-top:16px; display:flex; gap:10px; flex-wrap:wrap; }
.btn { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border-radius:8px; font-size:12px; font-weight:500; cursor:pointer; border:none; font-family:inherit; text-decoration:none; transition:opacity .2s,transform .1s; }
.btn:hover { opacity:.85; transform:translateY(-1px); }
.btn-ghost { background:var(--surface2); color:var(--text-muted); border:1px solid var(--border); }
.main { padding:32px 40px; max-width:1400px; margin:0 auto; }
.section-title { font-size:11px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--text-muted); margin-bottom:16px; display:flex; align-items:center; gap:8px; }
.section-title::after { content:''; flex:1; height:1px; background:var(--border); }
.last-updated { text-align:right; font-size:11px; color:var(--text-muted); margin-bottom:20px; }
.state-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:280px; gap:14px; color:var(--text-muted); }
.spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.error-box { background:var(--rojo-bg); border:1px solid rgba(239,68,68,.3); border-radius:12px; padding:24px; max-width:540px; text-align:center; }
.error-box h3 { color:var(--rojo); margin-bottom:8px; }
.error-box p { font-size:13px; color:var(--text-muted); line-height:1.7; }
.error-box ol { text-align:left; font-size:13px; color:var(--text-muted); line-height:2; padding-left:20px; margin-top:10px; }
.resumen-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:32px; }
.resumen-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:16px; text-align:center; }
.resumen-num { font-family:'DM Serif Display',serif; font-size:36px; line-height:1; margin-bottom:4px; }
.resumen-label { font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:.06em; }
.num-verde{color:var(--verde)} .num-amarillo{color:var(--amarillo)} .num-rojo{color:var(--rojo)} .num-gris{color:var(--gris)}
.legend-row { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:32px; }
.legend-item { display:flex; align-items:center; gap:8px; background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:6px 14px; font-size:12px; color:var(--text-muted); }
.dot-l { width:10px; height:10px; border-radius:50%; }
.pilares-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:14px; margin-bottom:36px; }
.pilar-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px; cursor:pointer; transition:border-color .2s,transform .15s,box-shadow .2s; position:relative; overflow:hidden; }
.pilar-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; border-radius:12px 12px 0 0; }
.pilar-card.verde::before{background:var(--verde)} .pilar-card.amarillo::before{background:var(--amarillo)} .pilar-card.rojo::before{background:var(--rojo)} .pilar-card.sin-datos::before{background:var(--gris)}
.pilar-card:hover { transform:translateY(-2px); box-shadow:0 8px 32px rgba(0,0,0,.3); border-color:var(--accent); }
.pilar-card.active { border-color:var(--accent2); background:var(--surface2); }
.pilar-header { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; margin-bottom:12px; }
.pilar-name { font-size:14px; font-weight:600; }
.pilar-meta { font-size:11px; color:var(--text-muted); margin-top:3px; }
.badge { display:inline-flex; align-items:center; gap:5px; border-radius:20px; padding:3px 10px; font-size:11px; font-weight:600; white-space:nowrap; flex-shrink:0; }
.b-verde{background:var(--verde-bg);color:var(--verde)} .b-amarillo{background:var(--amarillo-bg);color:var(--amarillo)} .b-rojo{background:var(--rojo-bg);color:var(--rojo)} .b-sin-datos{background:var(--gris-bg);color:var(--gris)}
.dots { display:flex; gap:4px; margin-top:10px; flex-wrap:wrap; }
.dot { width:24px; height:6px; border-radius:3px; transition:transform .15s; }
.dot:hover { transform:scaleY(2); }
.dot.verde{background:var(--verde)} .dot.amarillo{background:var(--amarillo)} .dot.rojo{background:var(--rojo)} .dot.sin-datos{background:var(--gris)}
.detalle { background:var(--surface); border:1px solid var(--border); border-radius:16px; overflow:hidden; margin-bottom:36px; display:none; animation:sd .25s ease; }
.detalle.open { display:block; }
@keyframes sd { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)} }
.detalle-top { padding:18px 24px; background:var(--surface2); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.detalle-top h3 { font-size:15px; font-weight:600; }
.close-btn { width:28px; height:28px; display:flex; align-items:center; justify-content:center; border-radius:6px; cursor:pointer; color:var(--text-muted); background:var(--border); border:none; font-size:16px; transition:background .15s; }
.close-btn:hover { background:var(--accent); color:#fff; }
table { width:100%; border-collapse:collapse; }
th { padding:10px 16px; text-align:left; font-size:10px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--text-muted); background:rgba(30,38,55,.5); border-bottom:1px solid var(--border); }
td { padding:14px 16px; border-bottom:1px solid rgba(42,51,71,.5); vertical-align:top; }
tr:last-child td { border-bottom:none; }
tr:hover td { background:rgba(99,102,241,.04); }
.td-nombre { font-weight:500; font-size:13px; margin-bottom:4px; }
.td-hito { font-size:11px; color:var(--text-muted); font-style:italic; }
.td-text { font-size:12px; color:var(--text-muted); line-height:1.5; }
.td-warn { font-size:12px; color:#fbbf24; line-height:1.5; }
.chips { display:flex; flex-wrap:wrap; gap:4px; }
.chip { font-size:10px; background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:2px 8px; color:var(--text-muted); }
.pb-wrap { display:flex; align-items:center; gap:8px; }
.pb { flex:1; height:6px; background:var(--border); border-radius:3px; overflow:hidden; min-width:60px; }
.pb-fill { height:100%; border-radius:3px; transition:width .5s; }
.pb-fill.verde{background:var(--verde)} .pb-fill.amarillo{background:var(--amarillo)} .pb-fill.rojo{background:var(--rojo)} .pb-fill.sin-datos{background:var(--gris)}
.pb-pct { font-size:11px; color:var(--text-muted); width:28px; text-align:right; }
.footer { text-align:center; padding:24px; color:var(--text-muted); font-size:11px; border-top:1px solid var(--border); }
@media(max-width:640px) {
  .header,.main { padding:20px; }
  .resumen-grid { grid-template-columns:repeat(2,1fr); }
  table { display:block; overflow-x:auto; }
  .hm { display:none; }
}
</style>
</head>
<body>

<div class="header">
  <div class="eyebrow">Grupo Oroño ACE · Sanatorio Parque</div>
  <h1>Tablero de Seguimiento — <em>Evolución SP</em></h1>
  <div class="header-meta">
    <span>Proyecto Evolución hacia la Excelencia · Fase I</span>
    <span class="live-badge"><span class="live-dot"></span>En vivo desde Google Sheets</span>
  </div>
  <div class="header-actions">
    <button class="btn btn-ghost" onclick="cargar()">↻ Actualizar datos</button>
    <a class="btn btn-ghost" href="https://docs.google.com/spreadsheets/d/1So9ruwd64KYuVb2RKVPUqt-RspbnsJWBtTXfBzWEOeI/edit" target="_blank">📊 Abrir Sheet</a>
  </div>
</div>

<div class="main"><div id="app"></div></div>
<div class="footer">Proyecto Evolución hacia la Excelencia · Sanatorio Parque · Grupo Oroño ACE</div>

<script>
const SHEET_ID = '1So9ruwd64KYuVb2RKVPUqt-RspbnsJWBtTXfBzWEOeI';
const PILARES  = ['🏥 Excelencia Clínica','🎯 Gestión Estratégica','🔒 Seguridad Personas','🔄 Cultura de Mejora'];

function parseCSV(text) {
  const rows = []; let cur = '', cells = [], inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], n = text[i+1];
    if (c === '"') { if (inQ && n === '"') { cur += '"'; i++; } else inQ = !inQ; }
    else if (c === ',' && !inQ) { cells.push(cur); cur = ''; }
    else if ((c === '\n' || (c === '\r' && n === '\n')) && !inQ) {
      if (c === '\r') i++; cells.push(cur); cur = ''; rows.push(cells); cells = [];
    } else { cur += c; }
  }
  if (cur || cells.length) { cells.push(cur); rows.push(cells); }
  return rows;
}

function detectarEstado(raw) {
  raw = (raw||'').toLowerCase();
  if (raw.includes('verde'))    return 'verde';
  if (raw.includes('amarillo')) return 'amarillo';
  if (raw.includes('rojo'))     return 'rojo';
  return 'sin-datos';
}

async function fetchPilar(pilar) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(pilar)}`;
  const res  = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const rows = parseCSV(await res.text());
  const items = [];
  for (let i = 3; i < rows.length; i++) {
    const r = rows[i], nombre = (r[1]||'').trim();
    if (!nombre || nombre.startsWith('←')) continue;
    const pct = parseFloat(r[9]);
    items.push({
      pilar, nombre,
      avances:     (r[2]||'').trim(),
      proximos:    (r[3]||'').trim(),
      riesgos:     (r[4]||'').trim(),
      responsable: (r[5]||'').trim(),
      consultor:   (r[6]||'').trim(),
      estado:      detectarEstado(r[7]),
      hito:        (r[8]||'').trim(),
      pct:         isNaN(pct) ? 0 : Math.min(100, Math.max(0, pct)),
    });
  }
  return items;
}

const bc = e => ({'verde':'b-verde','amarillo':'b-amarillo','rojo':'b-rojo','sin-datos':'b-sin-datos'}[e]||'b-sin-datos');
const bl = e => ({'verde':'🟢 Verde','amarillo':'🟡 Amarillo','rojo':'🔴 Rojo','sin-datos':'⚪ Sin datos'}[e]||'⚪ Sin datos');
function estadoPilar(items) {
  if (items.some(i=>i.estado==='rojo'))    return 'rojo';
  if (items.some(i=>i.estado==='amarillo')) return 'amarillo';
  if (items.every(i=>i.estado==='verde'))  return 'verde';
  return 'sin-datos';
}
function agrupar() {
  const m = {};
  todosItems.forEach(i => { if(!m[i.pilar]) m[i.pilar]=[]; m[i.pilar].push(i); });
  return PILARES.filter(p => m[p]).map(p => ({nombre:p, items:m[p]}));
}

let todosItems = [], activeId = null;

async function cargar() {
  activeId = null;
  document.getElementById('app').innerHTML = `
    <div class="state-screen">
      <div class="spinner"></div>
      <div style="font-size:13px">Cargando datos desde Google Sheets…</div>
    </div>`;
  try {
    const resultados = await Promise.allSettled(PILARES.map(fetchPilar));
    todosItems = [];
    resultados.forEach((r,i) => {
      if (r.status === 'fulfilled') todosItems.push(...r.value);
      else console.warn(`No se pudo cargar "${PILARES[i]}":`, r.reason);
    });
    if (!todosItems.length) throw new Error('Sin datos. ¿Publicaste el Sheet?');
    renderDashboard();
  } catch(err) {
    document.getElementById('app').innerHTML = `
      <div class="state-screen">
        <div class="error-box">
          <h3>No se pudieron cargar los datos</h3>
          <p>${err.message}</p>
          <ol>
            <li>Abrí el Google Sheet</li>
            <li>Archivo → Compartir → <strong>Publicar en la web</strong></li>
            <li>Elegí "Todo el documento" → CSV → <strong>Publicar</strong></li>
            <li>Volvé acá y hacé clic en Reintentar</li>
          </ol>
          <br>
          <button class="btn" style="background:var(--accent);color:#fff;margin:0 auto" onclick="cargar()">↻ Reintentar</button>
        </div>
      </div>`;
  }
}

function renderDashboard() {
  const ahora  = new Date().toLocaleString('es-AR', {dateStyle:'short', timeStyle:'short'});
  const counts = {verde:0, amarillo:0, rojo:0, 'sin-datos':0};
  todosItems.forEach(i => counts[i.estado] = (counts[i.estado]||0)+1);
  document.getElementById('app').innerHTML = `
    <div class="last-updated">Datos al ${ahora} · <a href="#" onclick="cargar();return false;" style="color:var(--accent2)">↻ Actualizar</a></div>
    <div class="section-title">Resumen general</div>
    <div class="resumen-grid">
      <div class="resumen-card"><div class="resumen-num num-verde">${counts.verde||0}</div><div class="resumen-label">🟢 En tiempo</div></div>
      <div class="resumen-card"><div class="resumen-num num-amarillo">${counts.amarillo||0}</div><div class="resumen-label">🟡 Atención</div></div>
      <div class="resumen-card"><div class="resumen-num num-rojo">${counts.rojo||0}</div><div class="resumen-label">🔴 Bloqueado</div></div>
      <div class="resumen-card"><div class="resumen-num num-gris">${counts['sin-datos']||0}</div><div class="resumen-label">⚪ Sin datos</div></div>
    </div>
    <div class="section-title">Leyenda</div>
    <div class="legend-row">
      <div class="legend-item"><span class="dot-l" style="background:var(--verde)"></span>Verde — En tiempo. Sin bloqueos.</div>
      <div class="legend-item"><span class="dot-l" style="background:var(--amarillo)"></span>Amarillo — En progreso. Requiere atención.</div>
      <div class="legend-item"><span class="dot-l" style="background:var(--rojo)"></span>Rojo — Bloqueado. Requiere decisión del Board.</div>
      <div class="legend-item"><span class="dot-l" style="background:var(--gris)"></span>Sin datos — No iniciado.</div>
    </div>
    <div class="section-title">Estado por pilar</div>
    <div class="pilares-grid" id="pilaresGrid"></div>
    <div class="detalle" id="detalle">
      <div class="detalle-top">
        <h3 id="detalle-titulo"></h3>
        <button class="close-btn" onclick="cerrar()">✕</button>
      </div>
      <div id="detalle-body"></div>
    </div>`;
  renderPilares();
}

function renderPilares() {
  const grupos = agrupar();
  const grid = document.getElementById('pilaresGrid');
  if (!grid) return;
  grid.innerHTML = grupos.map(p => {
    const st = estadoPilar(p.items);
    return `<div class="pilar-card ${st} ${activeId===p.nombre?'active':''}" onclick="toggle('${p.nombre.replace(/'/g,"\\'")}')">
      <div class="pilar-header">
        <div><div class="pilar-name">${p.nombre}</div><div class="pilar-meta">${p.items.length} ítems</div></div>
        <span class="badge ${bc(st)}">${bl(st)}</span>
      </div>
      <div class="dots">${p.items.map(i=>`<span class="dot ${i.estado}" title="${i.nombre}"></span>`).join('')}</div>
    </div>`;
  }).join('');
}

function toggle(nombre) {
  if (activeId === nombre) { cerrar(); return; }
  activeId = nombre; renderPilares();
  const p = agrupar().find(x => x.nombre === nombre);
  if (!p) return;
  document.getElementById('detalle-titulo').textContent = nombre;
  document.getElementById('detalle-body').innerHTML = `
    <table>
      <thead><tr>
        <th>Ítem / Proceso</th><th class="hm">Avances</th><th class="hm">Próximos pasos</th>
        <th class="hm">Riesgos · Bloqueos</th><th>Responsable</th><th>Estado</th><th>% Avance</th>
      </tr></thead>
      <tbody>${p.items.map(i=>`
        <tr>
          <td style="min-width:160px"><div class="td-nombre">${i.nombre}</div><div class="td-hito">${i.hito}</div></td>
          <td class="td-text hm" style="min-width:180px">${i.avances}</td>
          <td class="td-text hm" style="min-width:180px">${i.proximos}</td>
          <td class="td-warn hm" style="min-width:160px">${i.riesgos}</td>
          <td style="min-width:100px"><div class="chips">${i.responsable.split('·').map(r=>`<span class="chip">${r.trim()}</span>`).join('')}</div></td>
          <td style="min-width:80px"><span class="badge ${bc(i.estado)}" style="font-size:11px">${bl(i.estado)}</span></td>
          <td style="min-width:100px"><div class="pb-wrap"><div class="pb"><div class="pb-fill ${i.estado}" style="width:${i.pct}%"></div></div><span class="pb-pct">${i.pct}%</span></div></td>
        </tr>`).join('')}
      </tbody>
    </table>`;
  const d = document.getElementById('detalle');
  d.classList.add('open');
  setTimeout(() => d.scrollIntoView({behavior:'smooth', block:'nearest'}), 50);
}

function cerrar() {
  activeId = null;
  document.getElementById('detalle')?.classList.remove('open');
  renderPilares();
}

cargar();
</script>
</body>
</html>
